  :root{
    --forest:#2E453F; --forest-deep:#24372F; --forest-ink:#1E2C27;
    --lime:#D6FA5E; --lime-deep:#B8DE38;
    --coral:#FF9081; --coral-deep:#FF7D6B;
    --tan:#D3C6BA; --tan-light:#EEEDDE; --cream:#FFF2D1; --mocha:#63574E;
    --charcoal:#222222; --white:#FFFFFF;
    --hairline:rgba(46,69,63,.14);
    --sans:'Outfit',"Avenir Next","Helvetica Neue",sans-serif;
    --display:'Rye',Georgia,serif;
    --r-card:28px;
  }
  *{box-sizing:border-box; margin:0}
  body{
    background:var(--tan-light); color:var(--charcoal);
    font:400 15.5px/1.55 var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--lime); color:var(--forest)}

  /* lime strip */
  .strip{
    background:var(--lime); color:var(--forest);
    font:700 .7rem/1.5 var(--sans); letter-spacing:.1em; text-transform:uppercase;
    padding:.5rem 1.25rem; text-align:center;
  }

  /* forest masthead */
  .masthead{
    background:
      radial-gradient(130% 100% at 50% -30%, rgba(214,250,94,.10) 0%, rgba(214,250,94,0) 55%),
      linear-gradient(180deg, var(--forest) 0%, var(--forest-deep) 100%);
    color:var(--cream);
    padding:1.4rem 1.25rem 3.6rem;
  }
  .mast-inner{max-width:680px; margin:0 auto}
  .brandrow{display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap}
  .wordmark{display:flex; align-items:center; gap:.8rem}
  .wordmark svg{display:block; flex:none}
  .wordmark .name{font:400 1.3rem/1 var(--display); color:var(--cream); letter-spacing:.03em}
  .wordmark .loc{display:block; font:700 .6rem/1.7 var(--sans); letter-spacing:.3em; text-transform:uppercase; color:var(--lime)}
  .status{
    font:700 .68rem/1 var(--sans); letter-spacing:.14em; text-transform:uppercase;
    color:var(--forest); display:inline-flex; align-items:center; gap:.5rem;
    border-radius:999px; padding:.55rem 1.05rem; background:var(--lime);
    font-variant-numeric:tabular-nums; white-space:nowrap;
  }
  .status .dot{width:8px; height:8px; border-radius:50%; background:var(--forest)}
  h1{
    font:400 clamp(1.5rem,5.5vw,2.1rem)/1.2 var(--display);
    color:var(--cream); letter-spacing:.015em; margin-top:1.5rem;
    text-shadow:0 2px 0 rgba(30,44,39,.35); text-wrap:balance;
  }
  h1 em{font-style:normal; color:var(--lime)}
  .overall{display:flex; align-items:center; gap:12px; margin-top:1rem}
  .rail{flex:1; height:8px; background:rgba(255,242,209,.22); border-radius:999px; overflow:hidden}
  .rail > span{display:block; height:100%; background:var(--lime); border-radius:999px; width:0%; transition:width .25s ease}

  main{max-width:680px; margin:-2.2rem auto 0; padding:0 16px 108px; position:relative}

  section.dor{
    background:var(--white); border:1px solid var(--hairline); border-radius:var(--r-card);
    padding:1.3rem 1.4rem 1.1rem; margin-bottom:1rem;
    box-shadow:0 20px 44px -30px rgba(30,44,39,.35);
  }
  .dor-head{display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap}
  .dor-head h2{font:800 1.02rem/1.2 var(--sans); color:var(--forest); letter-spacing:.02em}
  .owners{
    font:700 .66rem/1 var(--sans); letter-spacing:.14em; text-transform:uppercase;
    color:var(--forest); background:var(--lime); border-radius:999px; padding:.35rem .8rem;
  }
  .dor-rail{display:flex; align-items:center; gap:10px; margin:.7rem 0 .6rem}
  .dor-rail .rail{background:rgba(46,69,63,.10)}
  .pct{font-variant-numeric:tabular-nums; font:600 .8rem/1 var(--sans); color:var(--mocha); min-width:52px; text-align:right}
  .overall .pct{color:rgba(255,242,209,.85); min-width:78px}

  ul.items{list-style:none; margin:0; padding:0}
  li.item{display:flex; align-items:center; gap:11px; padding:9px 2px; border-top:1px solid var(--hairline)}
  li.item button.check{
    flex:none; width:26px; height:26px; border-radius:50%;
    border:2px solid rgba(46,69,63,.4); background:transparent;
    cursor:pointer; display:grid; place-items:center;
    color:transparent; font-size:14px; font-weight:800; line-height:1;
    transition:background-color .12s ease, border-color .12s ease;
  }
  li.item.done button.check{background:var(--lime); border-color:var(--lime-deep); color:var(--forest)}
  li.item .label{flex:1; font-size:.95rem; font-weight:500}
  li.item.done .label{color:var(--mocha); text-decoration:line-through; text-decoration-color:var(--tan)}
  li.item button.flag{
    flex:none; border:2px solid transparent; background:transparent; cursor:pointer;
    font:600 .74rem/1 var(--sans); color:var(--mocha); padding:.35rem .7rem; border-radius:999px;
  }
  li.item.flagged button.flag{background:var(--coral); border-color:var(--coral-deep); color:var(--forest-ink); font-weight:700}
  button:focus-visible, textarea:focus-visible{outline:3px solid rgba(214,250,94,.8); outline-offset:1px}

  textarea.notes{
    width:100%; margin-top:10px; padding:9px 14px;
    border:2px solid var(--tan); border-radius:18px;
    background:var(--white); color:var(--charcoal);
    font:500 .86rem/1.5 var(--sans); resize:vertical; min-height:38px;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  textarea.notes:focus{outline:none; border-color:var(--forest); box-shadow:0 0 0 3px rgba(214,250,94,.5)}
  textarea.notes::placeholder{color:#A39A8E}

  .actions{
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    background:var(--white); border-top:1px solid var(--hairline);
    padding:11px 16px calc(11px + env(safe-area-inset-bottom));
    display:flex; gap:10px; justify-content:center;
  }
  .actions button{
    font:700 .8rem/1 var(--sans); letter-spacing:.08em; text-transform:uppercase;
    cursor:pointer; border-radius:999px; padding:.85rem 1.4rem;
    border:2px solid rgba(46,69,63,.4); background:var(--white); color:var(--forest);
    transition:background-color .15s ease, transform .12s ease;
  }
  .actions button:hover{background:var(--tan-light)}
  .actions button:active{transform:scale(.97)}
  .actions button.primary{background:var(--coral); border-color:var(--coral); color:var(--forest-ink)}
  .actions button.primary:hover{background:var(--coral-deep); border-color:var(--coral-deep)}

  dialog{
    border:1px solid var(--hairline); border-radius:var(--r-card); background:var(--white); color:var(--charcoal);
    max-width:560px; width:calc(100% - 32px); padding:1.3rem 1.4rem;
  }
  dialog::backdrop{background:rgba(30,44,39,.5)}
  dialog h3{font:800 1rem/1.2 var(--sans); color:var(--forest); margin-bottom:.6rem}
  dialog pre{
    white-space:pre-wrap; font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:12.5px;
    background:var(--tan-light); border:1px solid var(--hairline);
    border-radius:16px; padding:14px; max-height:50vh; overflow:auto; margin:0 0 14px;
  }
  dialog .row{display:flex; gap:10px; justify-content:flex-end}
  dialog button{
    font:700 .78rem/1 var(--sans); letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
    border-radius:999px; padding:.75rem 1.2rem; border:2px solid rgba(46,69,63,.4);
    background:var(--white); color:var(--forest);
  }
  dialog button.primary{background:var(--coral); border-color:var(--coral); color:var(--forest-ink)}
  dialog button.primary:hover{background:var(--coral-deep)}
  @media (prefers-reduced-motion: reduce){ .rail > span{transition:none} }
  /* ---- auth gate ---------------------------------------------------------
     Covers the page until Supabase hands back a real session. The gate is not
     the security boundary -- RLS is -- but nothing renders behind it. */
  .gate{
    position:fixed; inset:0; z-index:60; display:none; place-items:center;
    padding:24px; overflow:auto;
    background:linear-gradient(180deg, var(--forest) 0%, var(--forest-ink) 100%);
  }
  .gate.on{display:grid}
  .gate-card{
    width:100%; max-width:360px; background:var(--tan-light);
    border-radius:28px; padding:28px 24px; box-shadow:0 24px 60px rgba(0,0,0,.35);
  }
  .gate-mark{display:flex; align-items:center; gap:.6rem; margin-bottom:1.3rem}
  .gate-mark span{font:700 .6rem/1.7 var(--sans); letter-spacing:.3em; text-transform:uppercase; color:var(--mocha)}
  .gate-card h2{font:400 1.5rem/1.2 var(--display); color:var(--forest); margin-bottom:.3rem}
  .gate-card p.sub{color:var(--mocha); font-size:.88rem; margin-bottom:1.2rem}
  .gate-card label{
    display:block; font:700 .65rem/1.6 var(--sans); letter-spacing:.14em;
    text-transform:uppercase; color:var(--mocha); margin-bottom:.3rem;
  }
  .gate-card input{
    width:100%; margin-bottom:.9rem; padding:.7rem .9rem;
    border:1.5px solid var(--tan); border-radius:14px; background:var(--white);
    font:400 1rem var(--sans); color:var(--charcoal);
  }
  .gate-card input:focus{outline:none; border-color:var(--forest)}
  .gate-btn{
    width:100%; padding:.8rem; border:none; border-radius:999px; cursor:pointer;
    background:var(--coral); color:var(--forest-ink); font:700 .95rem var(--sans);
  }
  .gate-btn:hover{background:var(--coral-deep)}
  .gate-btn:disabled{opacity:.6; cursor:default}
  .gate-err{
    display:none; margin-top:.9rem; padding:.6rem .8rem; border-radius:12px;
    background:#FFE3DE; color:#8A2B1B; font-size:.85rem;
  }
  .gate-err.on{display:block}

  .whoami{display:none; align-items:center; gap:.6rem; font:600 .78rem var(--sans); color:var(--lime)}
  .whoami.on{display:flex}
  .whoami .rank{
    background:rgba(214,250,94,.14); border:1px solid rgba(214,250,94,.35);

  .whoami button{
    background:none; border:1px solid rgba(255,242,209,.35); color:var(--cream);
    font:600 .7rem var(--sans); padding:.25rem .7rem; border-radius:999px; cursor:pointer;
  }
  @media print{ .gate, .whoami{display:none !important} }
</style>

<script>
const DATA = [
  {
    key:"foh", title:"FOH — Front of House", owners:"Nolan + Marky",
    items:[
      "Windows cleaned / squeegeed",
      "Bags fully stocked",
      "POS areas cleaned and stocked",
      "Ancillary numbers adjusted",
      "Zone sheets completed at POS / sales floor",
      "FOH cleaned and organized",
      "Reception cleaned and organized",
      "Sales floor cleaned and guest-ready"
    ]
  },
  {
    key:"boh", title:"BOH — Back of House", owners:"Brandon + Maddie",
    items:[
      "Ancillary received",
      "Ancillary numbers adjusted",
      "Ancillary organized and put away",
      "Backhouse cleaned",
      "Vault cleaned and organized",
      "Backstock cleaned up",
      "Shelf space made for upcoming deliveries",
      "All labels made ahead of time",
      "All deliveries prepped for next week",
      "Invoice / manifest paperwork reviewed and filed"
    ]
  },
  {
    key:"ops", title:"OPS — Follow-Through", owners:"Rion + Yiseli",
    items:[
      "Huddles completed",
      "Huddle notes completed",
      "Seed Talent tracking updated",
      "Budtender observation forms completed",
      "Coaching in the moment",
      "Accountability check-ins with team",
      "FOH ↔ BOH communication confirmed"
    ]
  }
];

/* Supabase — one project, one publishable key. The key is public by design;
   it grants nothing on its own. Every row this page reads is gated by RLS
   against the signed-in user's token (supabase-auth-schema.sql). */
const SUPABASE_URL = "https://wantrprwskeciexiijxe.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Mebsuw6Qt7ZLCRuGEEcCLA_yPrw3H0R";
const SESSION_KEY = "ivy-auth-v1";

const auth = {
  session: null,
  profile: null,

  get uid(){ return this.session?.user?.id || null; },
  get mustChange(){ return !!this.session?.user?.user_metadata?.must_change_password; },

  /* expires_at is stamped locally so a token is refreshed a minute early
     rather than after a request has already failed. */
  store(s){
    this.session = {
      access_token: s.access_token,
      refresh_token: s.refresh_token,
      expires_at: Date.now() + (s.expires_in || 3600) * 1000,
      user: s.user
    };
    try{ localStorage.setItem(SESSION_KEY, JSON.stringify(this.session)); }catch(e){}
    return this.session;
  },
  restore(){
    try{ const r = localStorage.getItem(SESSION_KEY); if(r) this.session = JSON.parse(r); }catch(e){}
    return this.session;
  },
  clear(){
    this.session = null; this.profile = null;
    try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
  },

  async signIn(email, password){
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method:"POST",
      headers:{"Content-Type":"application/json", "apikey":SUPABASE_ANON_KEY},
      body: JSON.stringify({ email:String(email||"").trim().toLowerCase(), password })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error_description || data.msg || "Wrong email or password.");
    return this.store(data);
  },

  async refresh(){
    if(!this.session?.refresh_token) throw new Error("Signed out.");
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method:"POST",
      headers:{"Content-Type":"application/json", "apikey":SUPABASE_ANON_KEY},
      body: JSON.stringify({ refresh_token: this.session.refresh_token })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){ this.clear(); throw new Error("Your session expired — sign in again."); }
    return this.store(data);
  },

  async token(){
    if(!this.session) throw new Error("Signed out.");
    if(Date.now() > this.session.expires_at - 60000) await this.refresh();
    return this.session.access_token;
  },

  async changePassword(pw){
    const t = await this.token();
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method:"PUT",
      headers:{"Content-Type":"application/json", "apikey":SUPABASE_ANON_KEY, "Authorization":`Bearer ${t}`},
      body: JSON.stringify({ password: pw, data:{ must_change_password:false } })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.msg || data.error_description || "Could not set that password.");
    this.session.user = data;
    try{ localStorage.setItem(SESSION_KEY, JSON.stringify(this.session)); }catch(e){}
    return data;
  },

  async signOut(){
    try{
      const t = await this.token();
      await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
        method:"POST", headers:{"apikey":SUPABASE_ANON_KEY, "Authorization":`Bearer ${t}`}
      });
    }catch(e){}
    this.clear();
  },

  async loadProfile(){
    const rows = await api(`/rest/v1/profiles?select=display_name,role&id=eq.${this.uid}`);
    this.profile = rows?.[0] || null;
    return this.profile;
  }
};

/* Every authenticated REST call goes through here: fresh token, one retry on a
   401 (the token died mid-flight), and JSON out. */
async function api(path, opts = {}, retry = true){
  const t = await auth.token();
  const res = await fetch(`${SUPABASE_URL}${path}`, {
    ...opts,
    headers:{
      "Content-Type":"application/json",
      "apikey":SUPABASE_ANON_KEY,
      "Authorization":`Bearer ${t}`,
      ...(opts.headers || {})
    }
  });
  if(res.status === 401 && retry){ await auth.refresh(); return api(path, opts, false); }
  if(!res.ok) throw new Error("HTTP " + res.status);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const STORE_KEY = "aic-closeout-v1";
let state = load();

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return blank();
}
function blank(){
  const s = {sections:{}};
  DATA.forEach(sec => {
    s.sections[sec.key] = {done:{}, flagged:{}, notes:""};
  });
  return s;
}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){} }

const root = document.getElementById("sections");

function render(){
  root.innerHTML = "";
  DATA.forEach(sec => {
    const st = state.sections[sec.key];
    const el = document.createElement("section");
    el.className = "dor";
    const doneCount = sec.items.filter((_,i)=>st.done[i]).length;
    const pct = Math.round(100 * doneCount / sec.items.length);
    el.innerHTML = `
      <div class="dor-head">
        <h2>${sec.title}</h2>
        <span class="owners">${sec.owners}</span>
      </div>
      <div class="dor-rail">
        <div class="rail"><span style="width:${pct}%"></span></div>
        <span class="pct">${doneCount} / ${sec.items.length}</span>
      </div>
      <ul class="items"></ul>
      <textarea class="notes" placeholder="Notes / blockers for this area…">${escapeHtml(st.notes)}</textarea>
    `;
    const ul = el.querySelector("ul");
    sec.items.forEach((label, i) => {
      const li = document.createElement("li");
      li.className = "item" + (st.done[i] ? " done" : "") + (st.flagged[i] ? " flagged" : "");
      li.innerHTML = `
        <button class="check" aria-label="Mark done: ${escapeHtml(label)}" aria-pressed="${!!st.done[i]}">✓</button>
        <span class="label">${escapeHtml(label)}</span>
        <button class="flag" aria-label="Flag for follow-up: ${escapeHtml(label)}" aria-pressed="${!!st.flagged[i]}">${st.flagged[i] ? "⚑ follow-up" : "⚑"}</button>
      `;
      li.querySelector(".check").addEventListener("click", () => {
        st.done[i] = !st.done[i]; save(); render();
      });
      li.querySelector(".flag").addEventListener("click", () => {
        st.flagged[i] = !st.flagged[i]; save(); render();
      });
      ul.appendChild(li);
    });
    el.querySelector("textarea").addEventListener("input", e => {
      st.notes = e.target.value; save();
    });
    root.appendChild(el);
  });
  renderOverall();
}

function renderOverall(){
  let total = 0, done = 0;
  DATA.forEach(sec => {
    total += sec.items.length;
    done += sec.items.filter((_,i)=>state.sections[sec.key].done[i]).length;
  });
  document.getElementById("overallBar").style.width = (total ? 100*done/total : 0) + "%";
  document.getElementById("overallPct").textContent = `${done} / ${total}`;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

function buildDebrief(){
  const lines = ["AIC WEEKEND CLOSE-OUT — STATUS", ""];
  DATA.forEach(sec => {
    const st = state.sections[sec.key];
    const doneItems = sec.items.filter((_,i)=>st.done[i]);
    const openItems = sec.items.filter((_,i)=>!st.done[i]);
    const flaggedItems = sec.items.filter((_,i)=>st.flagged[i]);
    lines.push(`${sec.title} (${sec.owners}) — ${doneItems.length}/${sec.items.length} complete`);
    if(openItems.length) lines.push(`  Still open: ${openItems.join("; ")}`);
    if(flaggedItems.length) lines.push(`  Needs follow-up: ${flaggedItems.join("; ")}`);
    if(st.notes.trim()) lines.push(`  Notes: ${st.notes.trim()}`);
    lines.push("");
  });
  const total = DATA.reduce((n,s)=>n+s.items.length,0);
  const done = DATA.reduce((n,s)=>n+s.items.filter((_,i)=>state.sections[s.key].done[i]).length,0);
  lines.push(done === total
    ? "All areas complete. Ready to start the week clean. ✅"
    : `Overall: ${done}/${total} complete. Open items above.`);
  return lines.join("\n");
}

const dialog = document.getElementById("debriefDialog");
document.getElementById("debriefBtn").addEventListener("click", () => {
  document.getElementById("debriefText").textContent = buildDebrief();
  dialog.showModal();
});
document.getElementById("closeDialog").addEventListener("click", () => dialog.close());
document.getElementById("copyBtn").addEventListener("click", async () => {
  try{
    await navigator.clipboard.writeText(buildDebrief());
    document.getElementById("copyBtn").textContent = "Copied ✓";
    setTimeout(()=>{ document.getElementById("copyBtn").textContent = "Copy"; }, 1500);
  }catch(e){
    document.getElementById("copyBtn").textContent = "Select text above";
  }
});
document.getElementById("resetBtn").addEventListener("click", () => {
  if(document.getElementById("resetBtn").dataset.armed){
    state = blank(); save(); render();
    document.getElementById("resetBtn").textContent = "Reset weekend";
    delete document.getElementById("resetBtn").dataset.armed;
  } else {
    document.getElementById("resetBtn").dataset.armed = "1";
    document.getElementById("resetBtn").textContent = "Tap again to confirm";
    setTimeout(()=>{
      document.getElementById("resetBtn").textContent = "Reset weekend";
      delete document.getElementById("resetBtn").dataset.armed;
    }, 3000);
  }
});

/* ---- gate ----------------------------------------------------------------
   Nothing below the gate is built until Supabase confirms who you are AND a
   profile row gives them a rank. No profile = no rank = every RLS policy on
   this project fails, so there is nothing useful to render anyway. */
const gate = document.getElementById("gate");

function showGate(view){
  document.getElementById("gateSignin").hidden = view !== "signin";
  document.getElementById("gateChange").hidden = view !== "change";
  gate.classList.add("on");
  const first = view === "change" ? "gPw1" : "gEmail";
  setTimeout(()=>document.getElementById(first)?.focus(), 50);
}
function hideGate(){ gate.classList.remove("on"); gateErr(""); }
function gateErr(msg){
  const el = document.getElementById("gateErr");
  el.textContent = msg || "";
  el.classList.toggle("on", !!msg);
}

function identify(){
  document.getElementById("whoName").textContent = auth.profile.display_name;
  document.getElementById("whoRank").textContent = auth.profile.role;
  document.getElementById("whoami").classList.add("on");
}

document.getElementById("signinForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("gSigninBtn");
  btn.disabled = true; btn.textContent = "Signing in…"; gateErr("");
  try{
    await auth.signIn(document.getElementById("gEmail").value, document.getElementById("gPw").value);
    document.getElementById("gPw").value = "";
    if(auth.mustChange){ showGate("change"); return; }
    await start();
  }catch(err){
    gateErr(err.message);
  }finally{
    btn.disabled = false; btn.textContent = "Sign in";
  }
});

document.getElementById("changeForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pw1 = document.getElementById("gPw1").value;
  const pw2 = document.getElementById("gPw2").value;
  if(pw1.length < 10){ gateErr("10 characters or more, please."); return; }
  if(pw1 !== pw2){ gateErr("Those two don't match."); return; }
  const btn = document.getElementById("gChangeBtn");
  btn.disabled = true; btn.textContent = "Saving…"; gateErr("");
  try{
    await auth.changePassword(pw1);
    document.getElementById("gPw1").value = document.getElementById("gPw2").value = "";
    await start();
  }catch(err){
    gateErr(err.message);
  }finally{
    btn.disabled = false; btn.textContent = "Set password";
  }
});

document.getElementById("signoutBtn").addEventListener("click", async () => {
  await auth.signOut();
  location.reload();
});

async function start(){
  try{
    await auth.loadProfile();
  }catch(err){
    gateErr("Couldn't reach Ivy Hall. Check your signal and try again.");
    return;
  }
  if(!auth.profile){
    auth.clear();
    showGate("signin");
    gateErr("That account has no rank yet. Ask Rion to set it up.");
    return;
  }
  identify();
  render();
  hideGate();
}

async function boot(){
  auth.restore();
  if(!auth.session){ showGate("signin"); return; }
  try{ await auth.token(); }catch(err){
    auth.clear(); showGate("signin"); gateErr(err.message); return;
  }
  if(auth.mustChange){ showGate("change"); return; }
  await start();
}

boot();
</script>
